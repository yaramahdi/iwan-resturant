<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c41e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#1a1a1a"/>
  
  <!-- Plate -->
  <circle cx="150" cy="150" r="110" fill="url(#grillGrad)" filter="url(#glow)"/>
  <circle cx="150" cy="150" r="105" fill="#2a2a2a"/>
  
  <!-- Grilled meat pieces -->
  <g>
    <!-- Meat 1 -->
    <ellipse cx="120" cy="120" rx="35" ry="40" fill="#a8330f" transform="rotate(-15 120 120)"/>
    <path d="M95 100 Q120 90 145 110" stroke="#c41e2e" stroke-width="2" fill="none"/>
    <path d="M100 130 Q120 140 140 135" stroke="#c41e2e" stroke-width="2" fill="none"/>
    
    <!-- Meat 2 -->
    <ellipse cx="180" cy="130" rx="38" ry="42" fill="#a8330f" transform="rotate(20 180 130)"/>
    <path d="M150 110 Q175 95 205 115" stroke="#c41e2e" stroke-width="2" fill="none"/>
    <path d="M155 155 Q180 165 205 150" stroke="#c41e2e" stroke-width="2" fill="none"/>
    
    <!-- Meat 3 -->
    <ellipse cx="150" cy="165" rx="40" ry="38" fill="#a8330f" transform="rotate(-10 150 165)"/>
    <path d="M120 150 Q145 140 175 155" stroke="#c41e2e" stroke-width="2" fill="none"/>
    <path d="M125 175 Q150 190 175 175" stroke="#c41e2e" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Grill marks -->
  <g stroke="#ff6b35" stroke-width="1" opacity="0.6">
    <line x1="100" y1="90" x2="110" y2="140"/>
    <line x1="130" y1="85" x2="140" y2="140"/>
    <line x1="170" y1="90" x2="180" y2="145"/>
    <line x1="200" y1="100" x2="205" y2="155"/>
  </g>
  
  <!-- Highlight -->
  <ellipse cx="130" cy="100" rx="20" ry="15" fill="white" opacity="0.2"/>
</svg>