<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#4a90e2;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="drinkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c41e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e63946;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glassGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#1a1a1a"/>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="260" rx="70" ry="18" fill="rgba(0,0,0,0.3)"/>
  
  <!-- Glass outer edge -->
  <path d="M 110 110 L 105 240 Q 105 250 115 250 L 185 250 Q 195 250 195 240 L 190 110 Z" fill="url(#glassGrad)" opacity="0.3" filter="url(#glassGlow)"/>
  
  <!-- Glass shine -->
  <path d="M 112 115 L 108 235 Q 108 245 118 245 L 145 245 L 150 115 Z" fill="white" opacity="0.15"/>
  
  <!-- Drink inside glass -->
  <path d="M 115 180 L 112 240 Q 112 248 122 248 L 188 248 Q 196 248 196 240 L 190 180 Z" fill="url(#drinkGrad)"/>
  
  <!-- Drink highlight -->
  <ellipse cx="135" cy="200" rx="12" ry="20" fill="white" opacity="0.2"/>
  
  <!-- Ice cubes floating in drink -->
  <g opacity="0.7">
    <!-- Ice 1 -->
    <rect x="130" y="190" width="18" height="18" fill="#b3e5fc" stroke="#81d4fa" stroke-width="1" transform="rotate(15 139 199)"/>
    <rect x="132" y="192" width="14" height="14" fill="#e1f5fe"/>
    
    <!-- Ice 2 -->
    <rect x="155" y="215" width="16" height="16" fill="#b3e5fc" stroke="#81d4fa" stroke-width="1" transform="rotate(-20 163 223)"/>
    <rect x="157" y="217" width="12" height="12" fill="#e1f5fe"/>
    
    <!-- Ice 3 -->
    <rect x="125" y="225" width="14" height="14" fill="#b3e5fc" stroke="#81d4fa" stroke-width="1" transform="rotate(30 132 232)"/>
    <rect x="127" y="227" width="10" height="10" fill="#e1f5fe"/>
  </g>
  
  <!-- Glass rim -->
  <ellipse cx="150" cy="110" rx="40" ry="12" fill="none" stroke="#81d4fa" stroke-width="3"/>
  <ellipse cx="150" cy="108" rx="38" ry="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Straw -->
  <rect x="145" y="50" width="10" height="130" fill="none" stroke="#ff6b35" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <rect x="146" y="55" width="8" height="120" fill="none" stroke="#ffa500" stroke-width="1" opacity="0.6"/>
  
  <!-- Straw top (folded) -->
  <path d="M 155 50 Q 165 45 170 55" fill="none" stroke="#ff6b35" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Condensation drops on glass -->
  <g fill="rgba(255,255,255,0.2)" opacity="0.4">
    <circle cx="125" cy="140" r="2"/>
    <circle cx="175" cy="160" r="1.5"/>
    <circle cx="118" cy="180" r="1"/>
    <circle cx="182" cy="200" r="2"/>
    <circle cx="122" cy="220" r="1.5"/>
  </g>
  
  <!-- Lime garnish -->
  <circle cx="155" cy="105" r="8" fill="#22aa22"/>
  <circle cx="155" cy="105" r="7" fill="#3dd83d"/>
  <line x1="155" y1="98" x2="155" y2="112" stroke="#118811" stroke-width="0.5"/>
  <line x1="148" y1="105" x2="162" y2="105" stroke="#118811" stroke-width="0.5"/>
</svg>